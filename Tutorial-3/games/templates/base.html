<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Game Reviews{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #24364a;
            color: #1f2937;
            min-height: 100vh;
        }

        a {
            color: inherit;
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: #1d2b3c;
            color: #fff;
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 4px solid #5f73e8;
        }

        .brand h1 {
            font-size: 1.7rem;
            margin-bottom: 6px;
        }

        .brand p {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .nav-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        nav a {
            color: #dbeafe;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
        }

        nav a:hover {
            color: #fff;
            background: rgba(95, 115, 232, 0.25);
        }

        .content-area {
            flex: 1;
            background: #f5f7fb;
            padding: 24px;
        }

        .content-card {
            max-width: 1100px;
            margin: 0 auto;
        }

        footer {
            background: #111827;
            color: #9ca3af;
            font-size: 0.9rem;
            padding: 14px 0;
            text-align: center;
            margin-top: 24px;
            border-radius: 12px;
        }

        .mobile-only {
            display: none;
        }

        @media (max-width: 900px) {
            .app-shell {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 4px solid #5f73e8;
            }

            .content-area {
                padding: 16px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <h1>My Game Review Site</h1>
                <p>Browse games, add tags, and write reviews from the side navigation.</p>
            </div>

            <div>
                <div class="nav-title">Navigation</div>
                <nav>
                    <a href="{% url 'home' %}">Reviews</a>
                    <a href="{% url 'game_list' %}">Game List</a>
                    <a href="{% url 'game_add' %}">Add Game</a>
                    <a href="{% url 'review_add' %}">Add Review</a>
                    <a href="{% url 'tag_list' %}">Tags</a>
                    <a href="{% url 'tag_add' %}">Add Tag</a>
                    <a href="{% url 'admin:index' %}">Admin</a>
                </nav>
            </div>
        </aside>

        <main class="content-area">
            <div class="content-card">
                {% block content %}{% endblock %}

                <footer>
                    Django Game Reviews - simple UI for reviews and tags 22 April 2026.
                </footer>
            </div>
        </main>
    </div>
</body>
</html>
