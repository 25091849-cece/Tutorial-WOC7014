<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Reviews</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .reviews-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .review-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .review-card h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 10px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .review-card .developer {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
            font-style: italic;
        }

        .review-card .review-text {
            color: #333;
            font-size: 1em;
            line-height: 1.6;
            margin-bottom: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .review-card .date {
            color: #999;
            font-size: 0.85em;
            font-weight: 500;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .empty-state p {
            color: #999;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .review-card {
                padding: 20px;
            }

            .review-card h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Game Reviews</h1>
            <p>Discover what players think about their favorite games</p>
        </header>

        <div class="reviews-grid">
            {% for ga in reviews %}
                <div class="review-card">
                    <h2>{{ ga.game.title }}</h2>
                    <p class="developer">👤 Developer: {{ ga.game.developer }}</p>
                    <p class="review-text">{{ ga.review }}</p>
                    <p class="date">📅 {{ ga.date|date:"M d, Y" }}</p>
                </div>
            {% empty %}
                <div class="empty-state">
                    <p>No reviews yet. Be the first to add one! 🎯</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
