{% extends 'base.html' %}

{% block title %}Server Error - Phone Radar{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 3rem 2rem;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">⚠️</div>
        <h1 style="color: #333; margin-bottom: 0.5rem;">Server Error</h1>
        <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">
            Something went wrong on our end. Our team has been notified and is working on fixing it.
        </p>

        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{% url 'home' %}" class="btn btn-primary btn-lg">Back to Home</a>
            <a href="{% url 'phone_list' %}" class="btn btn-secondary" style="padding: 0.75rem 1.5rem; color: #333; background-color: #ecf0f1;">Browse Phones</a>
        </div>

        <div style="margin-top: 3rem; padding-top: 3rem; border-top: 1px solid #eee;">
            <p style="color: #999; font-size: 0.9rem;">Error 500 - Internal Server Error</p>
        </div>
    </div>
{% endblock %}
