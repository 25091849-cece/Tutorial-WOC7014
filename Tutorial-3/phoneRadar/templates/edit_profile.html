{% extends 'base.html' %}

{% block title %}Edit Profile - Phone Radar{% endblock %}

{% block content %}
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="color: #333; margin-bottom: 2rem; text-align: center;">✏️ Edit Profile</h1>

        <div style="background: white; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <form method="POST">
                {% csrf_token %}

                <!-- Username (Read-only) -->
                <div class="form-group">
                    <label>👤 Username:</label>
                    <input
                        type="text"
                        value="{{ user.username }}"
                        disabled
                        style="background-color: #f5f5f5; cursor: not-allowed;"
                    >
                    <small style="color: #999; display: block; margin-top: 0.5rem;">Username cannot be changed</small>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">📧 Email Address:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        value="{{ user.email }}"
                        required
                    >
                </div>

                <!-- Form Actions -->
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary btn-lg" style="flex: 1;">Save Changes</button>
                    <a href="{% url 'user_profile' %}" class="btn" style="background-color: #95a5a6; color: white; padding: 0.75rem 1.5rem; flex: 1; text-align: center; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>

        <!-- Change Password Card -->
        <div style="background: #f0f4ff; padding: 2rem; border-radius: 0.5rem; margin-top: 2rem; border-left: 4px solid #667eea;">
            <h3 style="color: #333; margin-bottom: 1rem;">🔐 Security</h3>
            <p style="color: #555; margin-bottom: 1.5rem;">Want to change your password?</p>
            <a href="{% url 'change_password' %}" class="btn btn-primary">Change Password</a>
        </div>
    </div>
{% endblock %}
