<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tutorial 2 - WOC7014</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --accent: #38bdf8;
            --accent-2: #22d3ee;
            --shadow: 0 20px 40px rgba(2, 6, 23, 0.45);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 15% 20%, rgba(56, 189, 248, 0.35), transparent 30%),
                radial-gradient(circle at 85% 80%, rgba(34, 211, 238, 0.25), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            padding: 24px;
        }

        .card {
            width: min(680px, 100%);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 28px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(1.4rem, 2.8vw, 2rem);
            line-height: 1.25;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin: 0 0 22px;
            color: var(--text-muted);
            font-size: 0.98rem;
        }

        .info {
            display: grid;
            gap: 12px;
        }

        .info p {
            margin: 0;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.35);
            border: 1px solid rgba(148, 163, 184, 0.22);
            color: var(--text-main);
        }

        .label {
            color: var(--accent);
            font-weight: 700;
            margin-right: 6px;
        }

        .footer-note {
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 0.86rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px 18px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Completed Tutorial 2 for WOC7014</h1>

        <section class="info">
            <p><span class="label">Name:</span> Cecelia Lim Jie Shi</p>
            <p><span class="label">Student ID:</span> 25091849</p>
        </section>

    </main>
</body>
</html>
